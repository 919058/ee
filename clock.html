<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7aa8d1 100%);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .title {
            color: white;
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .timezone-name {
            font-size: 1.2em;
            color: #64B5F6;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .digital-display {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
            border: 2px solid #64B5F6;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .time {
            font-size: 3em;
            font-weight: bold;
            color: #00FF00;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .meridiem {
            font-size: 1.2em;
            color: #00FF00;
            margin-top: 8px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .date {
            color: #B3E5FC;
            font-size: 0.95em;
            margin-top: 12px;
            font-weight: 500;
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            position: relative;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 50%;
            border: 3px solid #64B5F6;
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
        }

        .clock-center {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #64B5F6;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 35px;
            margin-left: -3px;
            background: #64B5F6;
            box-shadow: 0 0 5px rgba(100, 181, 246, 0.5);
        }

        .minute-hand {
            width: 4px;
            height: 50px;
            margin-left: -2px;
            background: #81C784;
            box-shadow: 0 0 5px rgba(129, 199, 132, 0.5);
        }

        .second-hand {
            width: 2px;
            height: 55px;
            margin-left: -1px;
            background: #FF6B6B;
            box-shadow: 0 0 3px rgba(255, 107, 107, 0.5);
        }

        .clock-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #64B5F6;
            font-size: 0.8em;
            font-weight: bold;
        }

        .offset {
            color: #FFB74D;
            font-size: 0.9em;
            margin-top: 8px;
            font-weight: 500;
        }

        .timezone-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .timezone-btn {
            padding: 8px 15px;
            background: rgba(100, 181, 246, 0.3);
            color: white;
            border: 1px solid #64B5F6;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            font-weight: bold;
        }

        .timezone-btn:hover {
            background: rgba(100, 181, 246, 0.6);
            transform: scale(1.05);
        }

        .timezone-btn.active {
            background: #64B5F6;
            color: #1a1a2e;
        }

        .footer {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .clocks-grid {
                grid-template-columns: 1fr;
                max-width: 100%;
            }

            .title {
                font-size: 2em;
            }

            .time {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🕐 Global Time Zone Clock</h1>
        
        <div class="timezone-selector" id="timezoneSelector"></div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="footer">
            <p>All times are synchronized and update in real-time</p>
        </div>
    </div>

    <script src="clock.js"></script>
</body>
</html>
